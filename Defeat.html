<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defeat</title>
    <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/svg+xml" href="images/Pokeball.svg">
    <link rel="shortcut icon" href="images/Pokeball.svg">
    <style>
        body {
            background: #3A1781;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Finger Paint', cursive, sans-serif;
        }
        .defeat-banner {
            background: #8B1111;
            border: 6px solid #4B0707;
            border-radius: 0 0 40px 40px/0 0 30px 30px;
            color: #fff;
            font-size: 4em;
            font-family: 'Finger Paint', cursive, sans-serif;
            padding: 0.2em 1.5em 0.1em 1.5em;
            margin-bottom: 2.5em;
            margin-top: 1em;
            letter-spacing: 0.05em;
            text-align: center;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 4px 16px #0006;
        }
        .restart-box {
            background: #0A6D3C;
            border: 6px solid #02701a;
            border-radius: 16px;
            color: #fff;
            font-size: 2.5em;
            font-family: 'Finger Paint', cursive, sans-serif;
            padding: 0.4em 1.2em 0.4em 1.2em;
            display: flex;
            align-items: center;
            gap: 0.5em;
            margin-top: 2em;
            box-shadow: 0 2px 8px #0005;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            min-width: 480px;
            max-width: 95vw;
            justify-content: center;
        }
        .restart-box:active {
            transform: scale(0.98);
        }
        .restart-icon {
            width: 1.5em;
            height: 1.5em;
            margin-left: 0.3em;
            vertical-align: middle;
            filter: drop-shadow(0 1px 0 #0008);
        }
        .sad-emoji {
            font-size: 5em;
        }
        @media (max-width: 600px) {
            .defeat-banner { font-size: 2.2em; width: 90vw; }
            .restart-box { font-size: 1.2em; min-width: 0; }
            .restart-icon { width: 2em; height: 2em; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">

</head>
<body>
    <div class="defeat-banner">DEFEAT</div>
    <div class="sad-emoji">😢</div>
    <div class="restart-box" id="restart-box">
        Clap ur hands to restart
        <img src="images/Clapwhite.svg" alt="Clap" class="restart-icon">
    </div>
<div id="voice-indicator" style="
  position: fixed;
  bottom: 1.2em;
  left: 1.2em;
  background: rgba(0,0,0,0.65);
  color: white;
  font-family: monospace;
  font-size: 1em;
  padding: 8px 16px;
  border-radius: 20px;
  z-index: 9999;
  display: none;
  min-width: 160px;
">
  <div id="voice-label" style="margin-bottom: 5px;">👂 …</div>
  <div style="
    background: #111;
    border-radius: 10px;
    height: 8px;
    width: 100%;
    overflow: hidden;
    border: 1px solid #333;
  ">
    <div id="voice-bar" style="
      height: 100%;
      width: 0%;
      border-radius: 10px;
      background: linear-gradient(90deg, #111, #4cff4c);
      transition: width 0.1s linear;
    "></div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@latest"></script>
    <script src="voice.js"></script>
    <script>
        // Allow click as fallback for restart
        document.getElementById('restart-box').onclick = function() {
            window.location.href = 'index.html';
        };
        // Voice command: handled in voice.js
        // On this page, 'clap' should restart
        window.handleVoiceCommand = function(cmd) {
            if (cmd.toLowerCase() === 'clap') {
                window.location.href = 'index.html';
            }
        };
    </script>
    <script src="audio.js"></script>
</body>
</html>
