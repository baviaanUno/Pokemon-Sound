<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokémon Battle</title>
  <link rel="stylesheet" href="battlee.css" />
  <link rel="icon" type="image/svg+xml" href="images/Pokeball.svg">
    <link rel="shortcut icon" href="images/Pokeball.svg">
  <style>
    /* Move button label under icon */
    .move-label {
      display: block;
      font-size: 9px;
      font-family: monospace;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
      text-align: center;
    }
    .move-fallback {
      width: 100%;
      padding: 18px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1.5px;
      border-radius: 6px;
      background: #555;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="battle">

  <!-- Background layers -->
  <div class="bg-sky"></div>
  <div class="bg-wave"></div>
  <div class="bg-ground"></div>

  <!-- Clouds -->
  <div class="cloud c1"><span></span><b></b><b></b></div>
  <div class="cloud c2"><span></span><b></b><b></b></div>

  <!-- Dirt platforms -->
  <div class="dirt dirt-e"></div>
  <div class="dirt dirt-p"></div>

  <!-- Player sprite (src set by battle.js) -->
  <div class="sprite sprite-p" id="spr-player">
    <img src="" alt="Player Pokemon">
  </div>

  <!-- Enemy sprite (src set by battle.js) -->
  <div class="sprite sprite-e" id="spr-enemy">
    <img src="" alt="Enemy Pokemon">
  </div>

  <!-- Timer -->
  <div class="timer" id="timer">00:00</div>

  <!-- Enemy HUD -->
  <div class="hud hud-e">
    <div class="hud-diamond">
      <img id="hud-enemy-icon" src="" alt="Enemy icon">
    </div>
    <div class="hud-body">
      <div class="hud-name" id="hud-enemy-name">Enemy</div>
      <div class="hp-row">
        <span class="hp-tag">HP</span>
        <div class="hp-track">
          <div class="hp-fill" id="hp-e" style="width:100%; background:#4cff4c;"></div>
        </div>
      </div>
      <div class="hp-nums" id="nums-e">100/100</div>
    </div>
  </div>

  <!-- Player HUD -->
  <div class="hud hud-p">
    <div class="hud-diamond">
      <img id="hud-player-icon" src="" alt="Player icon">
    </div>
    <div class="hud-body">
      <div class="hud-name" id="hud-player-name">Player</div>
      <div class="hp-row">
        <span class="hp-tag">HP</span>
        <div class="hp-track">
          <div class="hp-fill" id="hp-p" style="width:100%; background:#4cff4c;"></div>
        </div>
      </div>
      <div class="hp-nums" id="nums-p">100/100</div>
    </div>
  </div>

  <!-- Move list image (bottom right, replacing move buttons) -->
  <div class="move-list" id="move-list">
    <img id="move-list-img" src="" alt="Move List">
  </div>

  <!-- Dialog box -->
  <div class="dialog" id="dialog"></div>

  <!-- Confirmation Modal -->
  <div id="confirm-exit-modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.45); align-items:center; justify-content:center;">
    <div style="background:#222; color:#fff; border-radius:18px; padding:2em 2.5em; box-shadow:0 8px 32px #000a; display:flex; flex-direction:column; align-items:center; gap:1.5em; min-width:320px;">
      <div style="font-size:1.5em; font-family:'Finger Paint',cursive,sans-serif; margin-bottom:0.5em;">Are you sure you want to exit?</div>
      <div style="display:flex; gap:1.5em;">
        <button id="confirm-blow" style="background:#0A6D3C; color:#fff; border:none; border-radius:10px; font-size:1.2em; padding:0.7em 1.5em; display:flex; align-items:center; gap:0.5em; cursor:pointer; font-family:'Finger Paint',cursive,sans-serif;">
          <img src="images/Blowwhite.svg" alt="Blow" style="width:1.5em; height:1.5em;"> Blow
        </button>
        <button id="confirm-knock" style="background:#8B1111; color:#fff; border:none; border-radius:10px; font-size:1.2em; padding:0.7em 1.5em; display:flex; align-items:center; gap:0.5em; cursor:pointer; font-family:'Finger Paint',cursive,sans-serif;">
          <img src="images/Knockwhite.svg" alt="Knock" style="width:1.5em; height:1.5em;"> Knock
        </button>
      </div>
    </div>
  </div>

</div><!-- end #battle -->
<div id="voice-indicator" style="
  position: fixed;
  bottom: 1.2em;
  left: 1.2em;
  background: rgba(0,0,0,0.65);
  color: white;
  font-family: monospace;
  font-size: 1em;
  padding: 8px 16px;
  border-radius: 20px;
  z-index: 9999;
  display: none;
  min-width: 160px;
">
  <div id="voice-label" style="margin-bottom: 5px;">👂 …</div>
  <div style="
    background: #111;
    border-radius: 10px;
    height: 8px;
    width: 100%;
    overflow: hidden;
    border: 1px solid #333;
  ">
    <div id="voice-bar" style="
      height: 100%;
      width: 0%;
      border-radius: 10px;
      background: linear-gradient(90deg, #111, #4cff4c);
      transition: width 0.1s linear;
    "></div>
  </div>
</div>

<!-- Teachable Machine SDK -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>

<!-- voice.js must load before battle.js so POKEDEX is available -->
<script src="voice.js"></script>
<script src="audio.js"></script>
<script src="battle.js"></script>

</body>
</html>
