<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Victory!</title>
	<link rel="stylesheet" href="style.css">
	<style>
		body {
			background: #3A1781;
			min-height: 100vh;
			margin: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: 'Finger Paint', cursive, sans-serif;
		}
		/* Confetti */
		.confetti {
			position: fixed;
			width: 10px;
			height: 10px;
			top: -10px;
			animation: confetti-fall 3s linear forwards;
			z-index: 999;
		}
		@keyframes confetti-fall {
			0% { transform: translateY(0) rotate(0deg); opacity: 1; }
			100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
		}
		.victory-banner {
			background: #0A6D3C;
			border: 6px solid #02701a;
			border-radius: 0 0 40px 40px/0 0 30px 30px;
			color: #fff;
			font-size: 4em;
			font-family: 'Finger Paint', cursive, sans-serif;
			padding: 0.2em 1.5em 0.1em 1.5em;
			margin-bottom: 2.5em;
			margin-top: 1em;
			letter-spacing: 0.05em;
			text-align: center;
			width: 420px;
			max-width: 90vw;
			box-shadow: 0 4px 16px #0006;
		}
		.restart-box {
			background: #0A6D3C;
			border: 6px solid #02701a;
			border-radius: 16px;
			color: #fff;
			font-size: 2.5em;
			font-family: 'Finger Paint', cursive, sans-serif;
			padding: 0.4em 1.2em 0.4em 1.2em;
			display: flex;
			align-items: center;
			gap: 0.5em;
			margin-top: 2em;
			box-shadow: 0 2px 8px #0005;
			cursor: pointer;
			transition: transform 0.1s;
			user-select: none;
			min-width: 480px;
			max-width: 95vw;
			justify-content: center;
		}
		.restart-box:active {
			transform: scale(0.98);
		}
		.restart-icon {
			width: 1.5em;
			height: 1.5em;
			margin-left: 0.3em;
			vertical-align: middle;
			filter: drop-shadow(0 1px 0 #0008);
		}
		@media (max-width: 600px) {
			.victory-banner { font-size: 2.2em; width: 90vw; }
			.restart-box { font-size: 1.2em; min-width: 0; }
			.restart-icon { width: 2em; height: 2em; }
		}
	</style>
	<link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
</head>
<body>
	<div class="victory-banner">VICTORY</div>
	<div class="restart-box" id="restart-box">
		Clap ur hands to restart
		<img src="images/Clapwhite.svg" alt="Clap" class="restart-icon">
	</div>
	<script src="voice.js"></script>
	<script>
		// Confetti on page load
		const confettiColors = ['#ff0', '#0f0', '#00f', '#f0f', '#0ff', '#fa0'];
		for (let i = 0; i < 50; i++) {
			const conf = document.createElement('div');
			conf.className = 'confetti';
			conf.style.left = Math.random() * 100 + 'vw';
			conf.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
			conf.style.animationDelay = Math.random() * 2 + 's';
			conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
			document.body.appendChild(conf);
		}
		// Allow click as fallback for restart
		document.getElementById('restart-box').onclick = function() {
			window.location.href = 'index.html';
		};
		// Voice command: handled in voice.js
		// On this page, 'clap' should restart
		window.handleVoiceCommand = function(cmd) {
			if (cmd.toLowerCase() === 'clap') {
				window.location.href = 'index.html';
			}
		};
	</script>
</body>
</html>
