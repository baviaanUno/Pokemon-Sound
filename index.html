<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Sound</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Finger Paint' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@latest"></script>
    <link rel="icon" type="image/svg+xml" href="images/Pokeball.svg">
    <link rel="shortcut icon" href="images/Pokeball.svg">
</head>
<body>
    <div class="start">
    <img class="logo" src="images/group_18_1x.webp" alt="pokemonlogo">
    <button class="button" type="button">Clap to start👏</button>
    </div>
<div id="voice-indicator" style="
  position: fixed;
  bottom: 1.2em;
  left: 1.2em;
  background: rgba(0,0,0,0.65);
  color: white;
  font-family: monospace;
  font-size: 1em;
  padding: 8px 16px;
  border-radius: 20px;
  z-index: 9999;
  display: none;
  min-width: 160px;
">
  <div id="voice-label" style="margin-bottom: 5px;">👂 …</div>
  <div style="
    background: #111;
    border-radius: 10px;
    height: 8px;
    width: 100%;
    overflow: hidden;
    border: 1px solid #333;
  ">
    <div id="voice-bar" style="
      height: 100%;
      width: 0%;
      border-radius: 10px;
      background: linear-gradient(90deg, #111, #4cff4c);
      transition: width 0.1s linear;
    "></div>
  </div>
</div>
 
    <script src="voice.js"></script>
    <script>
        window.addEventListener('load', initVoice);
    </script>
    <script src="audio.js"></script>
</body>
</html>
