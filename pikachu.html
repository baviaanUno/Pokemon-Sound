<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
        <link href='https://fonts.googleapis.com/css?family=Finger Paint' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link rel="stylesheet" href="pikachu.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@latest"></script>
        <link rel="icon" type="image/svg+xml" href="images/Pokeball.svg">
    <link rel="shortcut icon" href="images/Pokeball.svg">
</head>
<body>
    <div class="close">
    <h2>Knock to go back</h2>
    <img class="knock" src="images/Knockwhite.svg" alt="">
    </div>
    <div class="box">
        <div>
            <img class="pokemon" src="images/image_6_4x.webp" alt="">
            <h2 class="pokemonnaam">Pikachu</h2>
        </div>
<ul class="moves-list">
    <li>
        <div class="move-header">
            <h2 class="Text">Clap</h2>
            <img src="images/Clapblack.svg" alt="" class="move-icon">
        </div>
        <p class="description">Deals 15 damage and has a 40% chance to paralyze</p>
    </li>

    <li>
        <div class="move-header">
            <h2 class="Text">Growl</h2>
            <img src="images/Growlblack.svg" alt="" class="move-icon">
        </div>
        <p class="description">Lowers opponents attack</p>
    </li>

    <li>
        <div class="move-header">
            <h2 class="Text">Knock</h2>
            <img src="images/Knockblack.svg" alt="" class="move-icon">
        </div>
        <p class="description">Deals 20 damage</p>
    </li>
        <li>
        <div class="move-header">
            <h2 class="Text">Blow</h2>
            <img src="images/Blowblack.svg" alt="" class="move-icon">
        </div>
        <p class="description">Returns you to titlescreen</p>
    </li>
</ul>
        <div class="blow">
            <h1>Clap to continue</h1>
            <img class="blowimg" src="images/Clapwhite.svg" alt="">
        </div>
    </div>
        <div id="voice-indicator" style="
  position: fixed;
  bottom: 1.2em;
  left: 1.2em;
  background: rgba(0,0,0,0.65);
  color: white;
  font-family: monospace;
  font-size: 1em;
  padding: 8px 16px;
  border-radius: 20px;
  z-index: 9999;
  display: none;
  transition: opacity 0.3s;
">👂 …</div>
    <script src="voice.js"></script>
    <script>
        window.addEventListener('load', initVoice);
    </script>
    <script src="audio.js"></script>
</body>
</html>
